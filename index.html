<!DOCTYPE html>
<html lang="en">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <!-- Fixed Left Sidebar -->
  <aside class="sidebar" id="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <svg viewBox="0 0 60 60" width="60" height="60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="30" fill="#002361"/>
        <text x="30" y="26" text-anchor="middle" fill="white" font-family="'Nunito Sans', sans-serif" font-size="11" font-weight="700" letter-spacing="1">MAVIS</text>
        <text x="30" y="39" text-anchor="middle" fill="white" font-family="'Nunito Sans', sans-serif" font-size="11" font-weight="700" letter-spacing="1">HU</text>
      </svg>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a href="#" class="nav-link active" data-page="work" id="nav-work">
        <span>WORK</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-link" data-page="resume" id="nav-resume">
        <span>RESUME</span>
      </a>

    <div class="sidebar-contact">
      <p class="contact-name">MAVIS MEIYI HU</p>
      <p class="contact-email">SEND2MAVIS@GMAIL.COM</p>

    <section class="page page-detail" id="page-detail">
      <div class="detail-content" id="detail-content">
        <img id="detail-image" src="" alt="" class="detail-image">

  <script src="script.js"></script>
</body>
</html>
