<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.googleapis.com">

          <circle cx="30" cy="30" r="30" fill="#002361"/>
          <text x="30" y="26" text-anchor="middle" fill="white" font-family="'Nunito Sans', sans-serif" font-size="11" font-weight="700" letter-spacing="1">MAVIS</text>

        </svg>
      </a>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a href="#work" class="nav-link active" id="nav-work">
        <span>WORK</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#resume" class="nav-link" id="nav-resume">
        <span>RESUME</span>
      </a>

    <!-- Contact -->
    <div class="sidebar-contact">
      <p class="contact-name">MAVIS MEIYI HU</p>

    <section class="page page-detail" id="page-detail">
      <div class="detail-header">
        <h1 class="detail-title" id="detail-title"></h1>
        <p class="detail-subtitle" id="detail-subtitle"></p>

  <script src="script.js"></script>
